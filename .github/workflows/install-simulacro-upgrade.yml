name: Instalar mejora del simulacro

on:
  push:
    paths:
      - '.github/workflows/install-simulacro-upgrade.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Insertar motor actualizado en index.html
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          tag = '<script src="simulacro-upgrade.js"></script>'

          if tag not in text:
              if '</body>' not in text:
                  raise SystemExit('No se encontró </body> en index.html')
              text = text.replace('</body>', tag + '\n</body>', 1)
              path.write_text(text, encoding='utf-8')
              print('Mejora instalada en index.html')
          else:
              print('La mejora ya estaba instalada')

      - name: Guardar cambio
        run: |
          if git diff --quiet; then
            echo "No hay cambios pendientes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Activar simulacro variable con banco fusionado"
          git push
